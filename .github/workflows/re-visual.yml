name: Visual

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  visual:
    name: Playwright visual regression
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so Chromium + every system
    # font + cairo / pango / freetype version exactly matches the Linux
    # rebaseline environment. Without this, bare-Ubuntu sub-pixel
    # rendering drifts ±1 px from the goldens. Bump in lockstep with the
    # `@playwright/test` version pinned in `apps/docs/package.json`.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Git refuses to operate on directories whose UID does not match
      # the running user. The Playwright image runs as root, so workspace
      # paths get flagged as "dubious ownership" until we mark them safe.
      - name: Mark git workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Image already ships Chromium + every system dep; skip the
      # `playwright install --with-deps` step. Saves ~30 s per run.

      - name: Build packages (docs needs uikit + uikit-css + uikit-js + uikit-icons dists)
        run: pnpm build

      - name: Run Playwright visual regression
        run: pnpm --filter @freecodecamp/uikit-docs test:visual

      - name: Upload Playwright failure artefacts
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: |
            apps/docs/playwright-report/
            apps/docs/test-results/
          retention-days: 14
          if-no-files-found: ignore
