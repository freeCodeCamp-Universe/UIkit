name: Build

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-tooling
      - name: Build all packages
        run: pnpm build
