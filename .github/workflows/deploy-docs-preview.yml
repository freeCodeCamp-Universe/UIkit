name: Deploy docs (preview)

# Per-PR Cloudflare Pages preview. The action's `gitHubToken` input wires
# a GitHub Deployment for the PR, which surfaces the preview URL on the
# PR's "Deployments" sidebar — no extra comment step needed.
#
# Forks are skipped: GitHub denies secret access from fork-originated PRs
# by default, so `cloudflare/wrangler-action` would fail with a confusing
# auth error. The `if:` guard rejects them up front.

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/deploy-docs-preview.yml'

permissions:
  contents: read
  deployments: write
  pull-requests: write

# Latest preview wins; cancel any in-flight upload for the same branch.
concurrency:
  group: deploy-docs-preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + deploy preview to Cloudflare Pages
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build docs site
        run: pnpm build:docs

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '4'
          workingDirectory: apps/docs
          command: pages deploy dist --project-name=fcc-design --branch=${{ github.head_ref }}
