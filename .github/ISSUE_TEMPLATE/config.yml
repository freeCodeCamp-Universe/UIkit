# Force users through the contact_links flow. The freeCodeCamp.org
# community handles bug-reporting through the contributor platform +
# forum; security disclosures follow SECURITY.md privately. Add
# bug_report.yml / feature_request.yml later only if signal-to-noise
# demands it (see docs/v1.1-backlog.md, repo-going-public follow-ups).
blank_issues_enabled: false

contact_links:
  - name: Contributor guide
    url: https://contribute.freecodecamp.org/
    about: How to contribute to freeCodeCamp.org repos including UIKit.

  - name: Forum (general questions)
    url: https://forum.freecodecamp.org/
    about: Post UIKit questions on the forum for community help.

  - name: Security disclosure
    url: https://github.com/freeCodeCamp/UIkit/blob/main/SECURITY.md
    about: Follow the disclosure process — do not open a public issue.
